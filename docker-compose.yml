services:
  mongodb:
    image: mongo:7
    container_name: syncora-mongodb
    ports:
      - "27017:27017"
    volumes:
      - syncora-mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  syncora-mongodb-data:
