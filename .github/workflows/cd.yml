name: CD (déploiement manuel)

# Déclenchement strictement manuel. Le job `guard` impose la branche master :
# même si on lance le workflow depuis une autre branche, le déploiement est refusé.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag d'image à construire/déployer (défaut: SHA du commit)"
        required: false
        default: ""

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  guard:
    name: Vérifier la branche master
    runs-on: ubuntu-latest
    steps:
      - name: Refuser hors master
        if: github.ref != 'refs/heads/master'
        run: |
          echo "Le déploiement n'est autorisé que depuis master (ref actuelle : ${{ github.ref }})."
          exit 1

  prepare:
    name: Préparer les métadonnées
    runs-on: ubuntu-latest
    needs: guard
    outputs:
      registry: ${{ steps.meta.outputs.registry }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - id: meta
        run: |
          OWNER="${{ github.repository_owner }}"
          REGISTRY="ghcr.io/$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')"
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build-backend:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - organizations-service
          - users-service
          - permissions-service
          - fleet-service
          - technicians-service
          - cases-service
          - stock-service
          - customers-service
          - subscriptions-service
          - notifications-service
          - documents-service
          - exports-service
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.backend
          build-args: |
            SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ${{ needs.prepare.outputs.registry }}/syncora-${{ matrix.service }}:${{ needs.prepare.outputs.tag }}
            ${{ needs.prepare.outputs.registry }}/syncora-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.frontend
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_CRISP_WEBSITE_ID=${{ vars.NEXT_PUBLIC_CRISP_WEBSITE_ID }}
            NEXT_PUBLIC_CRISP_HELPDESK_ENABLED=${{ vars.NEXT_PUBLIC_CRISP_HELPDESK_ENABLED }}
          push: true
          tags: |
            ${{ needs.prepare.outputs.registry }}/syncora-frontend:${{ needs.prepare.outputs.tag }}
            ${{ needs.prepare.outputs.registry }}/syncora-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Déploiement SSH (OVH)
    runs-on: ubuntu-latest
    needs: [prepare, build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Copier les fichiers de déploiement sur la VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          source: "deploy/docker-compose.prod.yml,deploy/Caddyfile"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true
      - name: Pull & up sur la VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          REGISTRY: ${{ needs.prepare.outputs.registry }}
          IMAGE_TAG: ${{ needs.prepare.outputs.tag }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          envs: REGISTRY,IMAGE_TAG,GHCR_USER,GHCR_TOKEN,DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH/deploy"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            # IMAGE_TAG/REGISTRY surchargent les valeurs du .env.production (secrets locaux conservés sur la VM).
            export REGISTRY IMAGE_TAG
            docker compose -f docker-compose.prod.yml --env-file .env.production pull
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans
            docker image prune -f
            docker logout ghcr.io
