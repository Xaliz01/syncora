name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint & Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build shared package
        run: npm run build -w @syncora/shared
      - name: Lint all workspaces
        run: npm run lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        service:
          - "@syncora/organizations-service"
          - "@syncora/users-service"
          - "@syncora/permissions-service"
          - "@syncora/fleet-service"
          - "@syncora/cases-service"
          - "@syncora/api-gateway"
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build shared package
        run: npm run build -w @syncora/shared
      - name: Run unit tests
        run: npm run test -w ${{ matrix.service }}

  e2e-tests:
    name: E2E tests (Frontend)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build shared package
        run: npm run build -w @syncora/shared
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/frontend
      - name: Run E2E tests
        run: npm run e2e -w @syncora/frontend
