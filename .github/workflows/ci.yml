name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: 1. Lint & Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `git diff base...head` can resolve the merge base on PRs.
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Prettier (fichiers modifiés)
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: npm run format:check:changed
      - name: ESLint
        run: npm run lint

  typecheck:
    name: 2. TypeScript
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck all workspaces
        run: npm run typecheck

  unit-tests:
    name: 3. Unit tests
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      fail-fast: false
      matrix:
        service:
          - "@syncora/organizations-service"
          - "@syncora/users-service"
          - "@syncora/permissions-service"
          - "@syncora/fleet-service"
          - "@syncora/technicians-service"
          - "@syncora/cases-service"
          - "@syncora/stock-service"
          - "@syncora/customers-service"
          - "@syncora/subscriptions-service"
          - "@syncora/notifications-service"
          - "@syncora/documents-service"
          - "@syncora/api-gateway"
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build shared package
        run: npm run build -w @syncora/shared
      - name: Run unit tests
        run: npm run test -w ${{ matrix.service }}

  e2e-tests:
    name: 4. E2E tests
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build shared package
        run: npm run build -w @syncora/shared
      - name: Install Playwright browsers
        working-directory: apps/frontend
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E tests
        working-directory: apps/frontend
        run: npm run e2e
