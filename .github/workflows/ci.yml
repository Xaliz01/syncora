name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: 1. Lint & Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `git diff base...head` can resolve the merge base on PRs.
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Prettier (fichiers modifiés)
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: npm run format:check:changed
      - name: ESLint
        run: npm run lint

  typecheck-matrix:
    name: 2. TypeScript (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - packages/shared
          - apps/frontend
          - services/api-gateway
          - services/organizations-service
          - services/users-service
          - services/permissions-service
          - services/fleet-service
          - services/technicians-service
          - services/cases-service
          - services/stock-service
          - services/customers-service
          - services/subscriptions-service
          - services/notifications-service
          - services/documents-service
          - services/exports-service
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build shared package
        run: npm run build -w @syncora/shared
      - name: Typecheck workspace
        working-directory: ${{ matrix.workspace }}
        run: npx tsc -p tsconfig.json --noEmit

  typecheck:
    name: 2. TypeScript
    runs-on: ubuntu-latest
    needs: typecheck-matrix
    if: always()
    steps:
      - name: Verify all typecheck jobs passed
        run: |
          if [ "${{ needs.typecheck-matrix.result }}" != "success" ]; then
            echo "One or more typecheck jobs failed or were skipped."
            exit 1
          fi

  unit-tests-matrix:
    name: 3. Unit tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      fail-fast: false
      matrix:
        service:
          - "@syncora/organizations-service"
          - "@syncora/users-service"
          - "@syncora/permissions-service"
          - "@syncora/fleet-service"
          - "@syncora/technicians-service"
          - "@syncora/cases-service"
          - "@syncora/stock-service"
          - "@syncora/customers-service"
          - "@syncora/subscriptions-service"
          - "@syncora/notifications-service"
          - "@syncora/documents-service"
          - "@syncora/exports-service"
          - "@syncora/api-gateway"
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build shared package
        run: npm run build -w @syncora/shared
      - name: Run unit tests
        run: npm run test -w ${{ matrix.service }}

  unit-tests:
    name: 3. Unit tests
    runs-on: ubuntu-latest
    needs: unit-tests-matrix
    if: always()
    steps:
      - name: Verify all unit test jobs passed
        run: |
          if [ "${{ needs.unit-tests-matrix.result }}" != "success" ]; then
            echo "One or more unit test jobs failed or were skipped."
            exit 1
          fi

  e2e-tests:
    name: 4. E2E tests
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build shared package
        run: npm run build -w @syncora/shared
      - name: Install Playwright browsers
        working-directory: apps/frontend
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E tests
        working-directory: apps/frontend
        run: npm run e2e
