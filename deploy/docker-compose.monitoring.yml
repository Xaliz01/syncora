# Stack monitoring Planwise (profil « monitoring ») — Grafana + Prometheus + Tempo (APM).
#
# Prérequis : la stack applicative doit déjà tourner (réseau Docker `planwise`).
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Activer les traces dans .env.production : OTEL_TRACES_ENABLED=true
#
# Démarrage monitoring :
#   docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml \
#     --env-file .env.production --profile monitoring up -d
#
# Accès Grafana : https://$MONITORING_DOMAIN (Caddy) ou tunnel SSH sur :3030
#   → Explore → Tempo pour les traces
#
# Prérequis .env.production :
#   MONITORING_DOMAIN=monitoring.planwise.fr
#   GRAFANA_ROOT_URL=https://monitoring.planwise.fr
#   GRAFANA_ADMIN_PASSWORD=...
#   OTEL_TRACES_ENABLED=true
#
# DNS : enregistrement A MONITORING_DOMAIN → IP de la VM.
services:
  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v3.2.1
    container_name: planwise-prometheus
    restart: unless-stopped
    networks: [planwise]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  tempo:
    profiles: ["monitoring"]
    image: grafana/tempo:2.8.4
    container_name: planwise-tempo
    restart: unless-stopped
    networks: [planwise]
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./monitoring/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  otel-collector:
    profiles: ["monitoring"]
    image: otel/opentelemetry-collector-contrib:0.118.0
    container_name: planwise-otel-collector
    restart: unless-stopped
    networks: [planwise]
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./monitoring/otel-collector.yml:/etc/otelcol/config.yml:ro
    depends_on:
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:13133/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:11.5.2
    container_name: planwise-grafana
    restart: unless-stopped
    networks: [planwise]
    # Tunnel SSH de secours (accès principal via Caddy → MONITORING_DOMAIN)
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3030}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD requis pour activer le monitoring}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:?GRAFANA_ROOT_URL requis (ex. https://monitoring.planwise.fr)}
      GF_SERVER_DOMAIN: ${MONITORING_DOMAIN:?MONITORING_DOMAIN requis}
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: lax
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  node-exporter:
    profiles: ["monitoring"]
    image: prom/node-exporter:v1.9.0
    container_name: planwise-node-exporter
    restart: unless-stopped
    networks: [planwise]
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  cadvisor:
    profiles: ["monitoring"]
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: planwise-cadvisor
    restart: unless-stopped
    networks: [planwise]
    privileged: true
    environment:
      DOCKER_API_VERSION: "1.44"
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg

  blackbox-exporter:
    profiles: ["monitoring"]
    image: prom/blackbox-exporter:v0.26.0
    container_name: planwise-blackbox-exporter
    restart: unless-stopped
    networks: [planwise]
    command:
      - --config.file=/etc/blackbox/blackbox.yml
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox/blackbox.yml:ro

volumes:
  prometheus-data:
  grafana-data:
  tempo-data:
