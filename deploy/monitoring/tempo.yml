stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 336h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

# Métriques RED dérivées des traces → Prometheus (dashboards requêtes / latence / erreurs).
metrics_generator:
  registry:
    collection_interval: 15s
    external_labels:
      source: tempo
      cluster: planwise
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces
  processor:
    span_metrics:
      dimensions:
        - http.method
        - http.target
        - http.status_code
      enable_target_info: false
    service_graphs:
      wait: 10s
      max_items: 10000
      workers: 10

overrides:
  defaults:
    metrics_generator:
      processors: [span-metrics, service-graphs]
