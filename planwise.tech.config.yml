tech:
  name: Planwise
  languages:
    - TypeScript
  frontend:
    language: TypeScript
    framework: React
    router: "à définir (React Router / TanStack Router)"
    state_management: TanStack Query
    styling: Tailwind CSS
    testing:
      e2e: Playwright
    quality:
      - ESLint
      - Prettier
  backend:
    runtime: Node.js
    framework: Nest.js
    language: TypeScript
    database:
      type: MongoDB
      orm: Mongoose
    testing:
      unit_integration: Jest
    quality:
      - ESLint
      - Prettier
  architecture:
    style: hexagonale
    pattern: microservices
    communication: REST
    api_gateway: true
    shared_package:
      name: "@planwise/shared"
      purpose:
        - Partage des types TypeScript
        - Contrats front/back
        - DTOs et schémas communs
        - Facilitation des appels inter-microservices
  devops:
    cloud: AWS
    container_orchestration: ECS
    observability:
      logging: Winston (JSON stdout, compatible Datadog Logs)
      apm_tracing: dd-trace (Datadog APM, log injection pour corrélation traces/logs)
      env_vars:
        - "LOG_LEVEL (niveau Winston: error, warn, info, debug)"
        - "DD_SERVICE, DD_ENV, DD_VERSION (Datadog)"
        - "STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PRICE_ID (abonnements ; webhook → subscriptions-service :3008/webhooks/stripe)"
        - "SUBSCRIPTIONS_SERVICE_URL (gateway → microservice abonnements)"
        - "EXPORTS_SERVICE_URL (gateway → microservice exports, défaut localhost:3012)"
        - "INTEGRATIONS_SERVICE_URL (gateway → microservice intégrations / Pennylane & Qonto, défaut localhost:3013)"
        - "INTEGRATIONS_ENCRYPTION_KEY (chiffrement des tokens API partenaires, 64 hex)"
        - "PENNYLANE_CLIENT_ID / PENNYLANE_CLIENT_SECRET (OAuth app Partnerships ; bouton Connecter avec Pennylane)"
        - "PENNYLANE_OAUTH_REDIRECT_URI ou APP_URL (callback /settings/integrations/pennylane/callback)"
        - "QONTO_CLIENT_ID / QONTO_CLIENT_SECRET (OAuth app Qonto ; bouton Connecter avec Qonto)"
        - "QONTO_OAUTH_REDIRECT_URI ou APP_URL (callback /settings/integrations/qonto/callback)"
        - "QONTO_STAGING_TOKEN + URLs sandbox (dev local uniquement ; header X-Qonto-Staging-Token)"
    ci_cd:
      provider: GitHub Actions
      pipeline:
        - Code quality (ESLint, Prettier)
        - Compilation
        - Tests unitaires et d'intégration
        - Tests e2e
        - Build & push images Docker conditionnel (par brique modifiée)
        - Déploiement AWS ECS
